const colors=['#7aa7d9','#e9a86d','#8bc6a9','#b49adf','#e7909a','#83c5d6','#c4cf7a','#d9b27a','#9fb7e8','#d9a7c7','#a7c7a1','#d6c08a','#8ecae6','#cdb4db','#ffb4a2','#b7d7c8','#f2cc8f','#a8dadc','#f4a6b8','#b8c0ff','#95d5b2','#ffd6a5','#caffbf','#fdffb6','#bde0fe','#ffc8dd','#d0bfff','#c9ada7','#a3b18a','#dda15e'];

];
let state=load(),active=null,typing=false,openColor=null,dragId=null,dropIndex=null,last=Date.now(),historyOpen=false;

function uuid(){if(window.crypto&&crypto.randomUUID)return crypto.randomUUID();return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{let r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16)})}
function isUuid(x){return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(x||''))}
function today(){return new Date().toISOString().slice(0,10)}
function clone(x){return JSON.parse(JSON.stringify(x))}
function normalizeBucket(b,i){
  let id=isUuid(b.id)?b.id:(isUuid(b.cloud_id)?b.cloud_id:(isUuid(b.cloudId)?b.cloudId:uuid()));
  return {id:id,cloudId:id,name:b.name||('Project '+(i+1)),elapsed:Number(b.elapsed)||0,target:Number(b.target)||60,color:b.color||colors[i%colors.length],notified:!!b.notified};
}
function load(){
  try{
    let raw=localStorage.getItem(KEY);
    if(!raw){for(let k of OLD){raw=localStorage.getItem(k);if(raw)break}}
    let s=raw?JSON.parse(raw):{date:today(),buckets:clone(defs),history:[]};
    s.date=s.date||today();s.history=s.history||[];
    s.buckets=(s.buckets&&s.buckets.length?s.buckets:clone(defs)).map(normalizeBucket);
    if(s.date!==today()){saveDay(s);s.date=today();s.buckets.forEach(b=>{b.elapsed=0;b.notified=false})}
    return s;
  }catch(e){return {date:today(),buckets:clone(defs).map(normalizeBucket),history:[]}}
}
function saveLocal(){localStorage.setItem(KEY,JSON.stringify(state))}
function save(){saveLocal();if(!applyingRemote)scheduleCloudSave()}
function saveDay(s){s.history=s.history||[];let d={date:s.date,buckets:clone(s.buckets)},i=s.history.findIndex(x=>x.date===s.date);if(i>=0)s.history[i]=d;else s.history.push(d)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function parseN(v,f){let n=parseInt(String(v).replace(/[^0-9]/g,''),10);return isNaN(n)?f:Math.max(1,Math.min(9999,n))}
function pad(n){return n<10?'0'+n:''+n}
function fmt(sec){sec=Math.max(0,Math.floor(sec));let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h?h+':'+pad(m)+':'+pad(s):pad(m)+':'+pad(s)}
function extra(b){let e=Math.max(0,b.elapsed-b.target*60);return e>0?'Full +'+fmt(e):'Full'}
function rgb(hex,a){let h=String(hex||'#7aa7d9').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');let n=parseInt(h,16);return`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`}
function chime(){try{let C=window.AudioContext||window.webkitAudioContext;if(!C)return;let c=new C(),now=c.currentTime;function t(f,s,d,g){let o=c.createOscillator(),gn=c.createGain();o.type='sine';o.frequency.setValueAtTime(f,now+s);gn.gain.setValueAtTime(.0001,now+s);gn.gain.exponentialRampToValueAtTime(g,now+s+.05);gn.gain.exponentialRampToValueAtTime(.0001,now+s+d);o.connect(gn);gn.connect(c.destination);o.start(now+s);o.stop(now+s+d+.05)}t(523,0,1.1,.045);t(659,.18,1,.035);t(784,.38,1.1,.03);setTimeout(()=>c.close(),2000)}catch(e){}}
function setStatus(t){let e=document.getElementById('syncStatus');if(e)e.textContent=t}
function updateSyncUI(){
  let box=document.getElementById('syncBox'),
      toggle=document.getElementById('accountToggle'),
      email=document.getElementById('emailInput'),
      pass=document.getElementById('passwordInput'),
      signin=document.getElementById('signinBtn'),
      signup=document.getElementById('signupBtn'),
      reset=document.getElementById('resetPassBtn'),
      logout=document.getElementById('logoutBtn');
  if(!box)return;
  box.classList.toggle('collapsed',!accountPanelOpen);
  if(toggle){
    toggle.classList.toggle('signedIn',!!currentUser);
    toggle.textContent=currentUser?'✓':'☁︎';
    toggle.title=currentUser?'Synced account':'Sync account';
  }
  if(currentUser){
    box.classList.add('signedIn');
    if(email)email.style.display='none';
    if(pass)pass.style.display='none';
    if(signin)signin.style.display='none';
    if(signup)signup.style.display='none';
    if(reset)reset.style.display='none';
    if(logout)logout.style.display='block';
    setStatus('Synced: '+(currentUser.email||'user'));
  }else{
    box.classList.remove('signedIn');
    if(email)email.style.display='block';
    if(pass)pass.style.display='block';
    if(signin)signin.style.display='block';
    if(signup)signup.style.display='block';
    if(reset)reset.style.display='block';
    if(logout)logout.style.display='none';
    setStatus('Local only');
  }
}
function bucketRows(){
  return state.buckets.map((b,i)=>({
    id:b.cloudId||b.id,user_id:currentUser.id,name:b.name,color:b.color,target_seconds:Math.round((Number(b.target)||0)*60),
    elapsed_seconds:Number(b.elapsed)||0,sort_order:i,notified:!!b.notified,updated_at:new Date().toISOString()
  }));
}
function timerRow(){
  return {user_id:currentUser.id,active_bucket_id:active?active:null,active_started_at:active?activeStartedAt:null,updated_at:new Date().toISOString()};
}
function scheduleCloudSave(){if(!currentUser||!supabaseClient)return;clearTimeout(cloudTimer);cloudTimer=setTimeout(pushCloud,500)}
async function pushCloud(){
  if(!currentUser||!supabaseClient)return;
  try{
    let rows=bucketRows();
    if(rows.length){let r=await supabaseClient.from('buckets').upsert(rows,{onConflict:'id'});if(r.error)throw r.error}
    let ts=await supabaseClient.from('timer_state').upsert(timerRow(),{onConflict:'user_id'});if(ts.error)throw ts.error;
    let dl=await supabaseClient.from('day_logs').upsert({user_id:currentUser.id,date:state.date,bucket_snapshot:state.buckets,updated_at:new Date().toISOString()},{onConflict:'user_id,date'});if(dl.error)throw dl.error;
    setStatus('Synced');
  }catch(e){console.error(e);setStatus('Save error: '+(e.message||'cloud'))}
}
async function pullCloud(force){
  if(!currentUser||!supabaseClient)return;
  if(!force&&Date.now()-lastPull<2000)return;lastPull=Date.now();
  try{
    setStatus('Loading...');
    let br=await supabaseClient.from('buckets').select('*').order('sort_order',{ascending:true});
    if(br.error)throw br.error;
    applyingRemote=true;
    if(br.data&&br.data.length){
      let currentById={};state.buckets.forEach(b=>currentById[b.cloudId||b.id]=b);
      state.buckets=br.data.map((r,i)=>{
        let old=currentById[r.id]||{};
        return {id:r.id,cloudId:r.id,name:r.name,color:r.color,target:Math.round((r.target_seconds||3600)/60),elapsed:Number(r.elapsed_seconds)||0,notified:!!r.notified};
      });
    }else{
      applyingRemote=false;await pushCloud();applyingRemote=true;
    }
    let lr=await supabaseClient.from('day_logs').select('*').order('date',{ascending:true});
    if(lr.error)throw lr.error;
    if(lr.data)state.history=lr.data.filter(x=>x.date!==state.date).map(x=>({date:x.date,buckets:x.bucket_snapshot||[]}));
    let tr=await supabaseClient.from('timer_state').select('*').maybeSingle();
    if(tr.error)throw tr.error;
    if(tr.data&&tr.data.active_bucket_id){active=tr.data.active_bucket_id;activeStartedAt=tr.data.active_started_at;last=Date.now();syncActiveElapsedFromStart()}
    else{active=null;activeStartedAt=null;last=Date.now()}
    saveLocal();applyingRemote=false;setStatus('Synced');render();
  }catch(e){applyingRemote=false;console.error(e);setStatus('Load error: '+(e.message||'cloud'))}
}
function syncActiveElapsedFromStart(){
  if(!active||!activeStartedAt)return;
  let b=state.buckets.find(x=>(x.cloudId||x.id)===active||x.id===active);if(!b)return;
  // elapsed in bucket is treated as the base elapsed at the moment the active timer was started.
  // Add wall-clock time since activeStartedAt when rendering/ticking on another device.
  let started=new Date(activeStartedAt).getTime();
  if(!isNaN(started)){let base=Number(b.elapsed)||0;let nowElapsed=base+(Date.now()-started)/1000;if(nowElapsed>b.elapsed)b.elapsed=nowElapsed}
}
async function startRealtime(){
  if(!supabaseClient||!currentUser)return;
  try{if(realtimeChannel)await supabaseClient.removeChannel(realtimeChannel)}catch(e){}
  realtimeChannel=supabaseClient.channel('time-buckets-'+currentUser.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'buckets'},()=>pullCloud(true))
    .on('postgres_changes',{event:'*',schema:'public',table:'timer_state'},()=>pullCloud(true))
    .on('postgres_changes',{event:'*',schema:'public',table:'day_logs'},()=>pullCloud(true))
    .subscribe();
}
async function initSync(){
  if(!supabaseClient){setStatus('Sync unavailable');return}
  let sess=await supabaseClient.auth.getSession();currentUser=sess.data&&sess.data.session?sess.data.session.user:null;if(currentUser)accountPanelOpen=false;updateSyncUI();
  if(currentUser){await pullCloud(true);await startRealtime()}
  supabaseClient.auth.onAuthStateChange(async(evt,session)=>{
    currentUser=session?session.user:null;
    updateSyncUI();
    if(evt==='PASSWORD_RECOVERY'){
      let p=prompt('Enter a new password for Time Buckets (6+ characters):');
      if(p&&p.length>=6){
        let out=await supabaseClient.auth.updateUser({password:p});
        if(out.error)setStatus('Password update error: '+out.error.message);
        else setStatus('Password updated');
      }
    }
    if(currentUser){await pullCloud(true);await startRealtime()}
  });
  let login=null,logout=document.getElementById('logoutBtn');
  if(login)login.onclick=async e=>{e.stopPropagation();let email=(document.getElementById('emailInput').value||'').trim();if(!email){setStatus('Enter email');return}setStatus('Sending link...');let out=await supabaseClient.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.origin+window.location.pathname}});if(out.error){console.error(out.error);setStatus('Login error: '+out.error.message)}else setStatus('Check email')};
  if(logout)logout.onclick=async e=>{e.stopPropagation();if(supabaseClient)await supabaseClient.auth.signOut();currentUser=null;active=null;activeStartedAt=null;updateSyncUI();render()};
  setInterval(()=>{if(currentUser)pullCloud(false)},5000);
}

function render(){
  if(typing)return;
  document.querySelectorAll('.dropIndicator').forEach(e=>e.remove());
  let list=document.getElementById('list');list.innerHTML='';
  state.buckets.forEach((b,i)=>{
    let pct=Math.min(b.elapsed/(b.target*60),1)*100,run=active===(b.cloudId||b.id)||active===b.id,full=b.elapsed>=b.target*60;
    let sw=colors.map(c=>`<span class="swatch" data-c="${c}" style="background:${c}"></span>`).join('');
    let row=document.createElement('section');row.className='row'+(run?' running':'')+(full?' full':'');row.draggable=true;row.dataset.id=b.id;row.style.setProperty('--bar-color',b.color);row.style.setProperty('--bar-bg',rgb(b.color,.24));
    row.innerHTML=`<div class="handle">⋮</div><div class="colorWrap"><div class="colorDot" style="background:${b.color}"></div><div class="popup ${openColor===b.id?'open':''}"><div class="popTop"><span>Color</span><span class="close">×</span></div><div class="swatches">${sw}</div></div></div><input class="name" value="${esc(b.name)}"><div class="bar"><div class="fill" style="width:${pct}%"></div><div class="text">${full?extra(b):(run?fmt(b.elapsed):'')}</div></div><input class="target" value="${b.target}m" inputmode="numeric"><button class="btn reset">↺</button><button class="btn plus">+5</button>`;
    list.appendChild(row);
    row.ondragstart=e=>{dragId=b.id;e.dataTransfer.setData('text/plain',b.id);row.classList.add('dragging')};
    row.ondragend=()=>{dragId=null;row.classList.remove('dragging');document.querySelectorAll('.dropIndicator').forEach(e=>e.remove());trash.classList.remove('over')};
  });
  wire();if(historyOpen)drawChart();
}
function wire(){
  document.querySelectorAll('.row').forEach(row=>{
    let b=state.buckets.find(x=>x.id===row.dataset.id);if(!b)return;
    row.querySelector('.colorDot').onclick=e=>{e.stopPropagation();openColor=openColor===b.id?null:b.id;render()};
    row.querySelector('.popup').onclick=e=>e.stopPropagation();
    row.querySelector('.close').onclick=e=>{e.stopPropagation();openColor=null;render()};
    row.querySelectorAll('.swatch').forEach(s=>s.onclick=e=>{b.color=s.dataset.c;save();render()});
    let name=row.querySelector('.name');name.onfocus=()=>typing=true;name.oninput=()=>{b.name=name.value||'Untitled';save()};name.onblur=()=>{typing=false;save();render()};
    let target=row.querySelector('.target');target.onfocus=()=>{typing=true;target.value=String(b.target);target.select()};target.onblur=()=>{b.target=parseN(target.value,b.target);b.notified=b.elapsed>=b.target*60;typing=false;save();render()};target.onkeydown=e=>{if(e.key==='Enter')target.blur()};
    row.querySelector('.bar').onclick=()=>{let id=b.cloudId||b.id;if(active===id){active=null;activeStartedAt=null;last=Date.now();pushCloud();}else{active=id;activeStartedAt=new Date().toISOString();last=Date.now();pushCloud();}saveLocal();render()};
    row.querySelector('.reset').onclick=()=>{b.elapsed=0;b.notified=false;if(active===(b.cloudId||b.id)){active=null;activeStartedAt=null}save();render()};
    row.querySelector('.plus').onclick=()=>{let before=b.elapsed,t=b.target*60;if(before<t&&before+300>=t){b.elapsed=t;if(!b.notified){b.notified=true;chime()}}else{b.elapsed+=300;if(b.elapsed>=t&&!b.notified){b.notified=true;chime()}}if(active===(b.cloudId||b.id)&&b.notified){active=null;activeStartedAt=null}save();render()};
  });
}
function indexFromY(y){let rows=[...document.querySelectorAll('.row')];for(let i=0;i<rows.length;i++){let r=rows[i].getBoundingClientRect();if(y<r.top+r.height/2)return i}return rows.length}
function showDrop(i){document.querySelectorAll('.dropIndicator').forEach(e=>e.remove());let ind=document.createElement('div');ind.className='dropIndicator';let rows=[...document.querySelectorAll('.row')],list=document.getElementById('list');if(i>=rows.length)list.appendChild(ind);else list.insertBefore(ind,rows[i])}
let list=document.getElementById('list'),trash=document.getElementById('trash');
list.ondragover=e=>{if(!dragId)return;e.preventDefault();dropIndex=indexFromY(e.clientY);showDrop(dropIndex)};
list.ondrop=e=>{e.preventDefault();let from=state.buckets.findIndex(x=>x.id===dragId);if(from<0)return;let m=state.buckets.splice(from,1)[0];if(dropIndex>from)dropIndex--;state.buckets.splice(Math.max(0,dropIndex),0,m);save();render()};
trash.ondragover=e=>{e.preventDefault();trash.classList.add('over')};
trash.ondragleave=()=>trash.classList.remove('over');
trash.ondrop=e=>{e.preventDefault();let b=state.buckets.find(x=>x.id===dragId);state.buckets=state.buckets.filter(x=>x.id!==dragId);if(active&&b&&active===(b.cloudId||b.id)){active=null;activeStartedAt=null};if(currentUser&&b&&supabaseClient){supabaseClient.from('buckets').delete().eq('id',b.cloudId||b.id)}dragId=null;save();render()};

function tick(){
  let now=Date.now(),d=(now-last)/1000;last=now;
  if(today()!==state.date){saveDay(state);state.date=today();state.buckets.forEach(b=>{b.elapsed=0;b.notified=false});active=null;activeStartedAt=null;save();render();return}
  if(!active)return;
  let b=state.buckets.find(x=>(x.cloudId||x.id)===active||x.id===active);if(!b)return;
  b.elapsed+=d;
  if(b.elapsed>=b.target*60&&!b.notified){b.notified=true;chime()}
  saveLocal();render();
}
function addDays(ds,n){let d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function days(){let arr=(state.history||[]).concat([{date:state.date,buckets:state.buckets}]),map={};arr.forEach(d=>map[d.date]=d);let keys=Object.keys(map).sort();if(!keys.length)return[];let out=[],cur=keys[0],guard=0;while(cur<=state.date&&guard++<31){out.push(map[cur]||{date:cur,buckets:[]});cur=addDays(cur,1)}return out.slice(-14)}
function dayLabel(d){let p=d.split('-');return p.length===3?String(parseInt(p[2],10)):d}
function monthLabel(d){let p=d.split('-');if(p.length!==3)return'';let m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[parseInt(p[1],10)-1]||''}
function drawChart(){
  let c=document.getElementById('chart'),ctx=c.getContext('2d'),ds=days(),slots=Math.max(7,ds.length+3),barW=24,gap=10,padL=34,padR=10,padT=24,padB=34;
  c.width=padL+padR+slots*barW+(slots-1)*gap;c.height=230;
  let w=c.width,h=c.height,ch=h-padT-padB,target=Math.max(30,state.buckets.reduce((a,b)=>a+b.target,0)),actual=Math.max(0,...ds.map(d=>(d.buckets||[]).reduce((a,b)=>a+(Number(b.elapsed)||0)/60,0))),yMax=Math.max(target,actual),half=yMax/2;
  ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(0,0,0,.82)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+ch);ctx.lineTo(w-padR,padT+ch);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.78)';ctx.font='13px -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(yMax),padL-5,padT+4);ctx.fillText(Math.round(half),padL-5,padT+ch/2+4);
  ds.forEach((day,i)=>{let x=padL+i*(barW+gap),y=padT+ch;(day.buckets||[]).forEach(b=>{let bh=Math.min(((Number(b.elapsed)||0)/60)/yMax*ch,ch);y-=bh;ctx.fillStyle=b.color;ctx.fillRect(x,y,barW,bh)});let full=(day.buckets||[]).length&&(day.buckets||[]).every(b=>(Number(b.elapsed)||0)>=(Number(b.target)||0)*60);if(full){ctx.save();ctx.font='17px -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillStyle='#fbbf24';ctx.shadowColor='rgba(251,191,36,.55)';ctx.shadowBlur=8;ctx.fillText('👑',x+barW/2,padT-6);ctx.restore()}ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.78)';ctx.font='14px -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif';ctx.fillText(dayLabel(day.date),x+barW/2,h-18);if(i===0||dayLabel(day.date)==='1'){ctx.font='11px -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif';ctx.fillStyle='rgba(0,0,0,.64)';ctx.fillText(monthLabel(day.date),x+barW/2,h-5)}});
  ctx.textAlign='start';
}
document.onclick=()=>{if(openColor){openColor=null;render()}};
document.getElementById('add').onclick=e=>{e.stopPropagation();let i=state.buckets.length;state.buckets.push({id:uuid(),cloudId:null,name:'Project '+(i+1),elapsed:0,target:60,color:colors[i%colors.length],notified:false});state.buckets[state.buckets.length-1].cloudId=state.buckets[state.buckets.length-1].id;save();render()};
document.getElementById('history').onclick=e=>{e.stopPropagation();historyOpen=!historyOpen;document.getElementById('panel').className='panel'+(historyOpen?' open':'');saveDay(state);save();if(historyOpen)drawChart()};


let acct=document.getElementById('accountToggle');
if(acct)acct.onclick=e=>{e.stopPropagation();accountPanelOpen=!accountPanelOpen;updateSyncUI()};
initSync();render();setInterval(tick,1000);
})();

</script></body></html>
