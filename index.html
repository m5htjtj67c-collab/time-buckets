          const monthName=new Date(day.date+'T00:00:00').toLocaleString('default',{month:'long'});
          parts.push(`<text x="${cx}" y="${label1Y}" text-anchor="middle" font-size="10" font-weight="900" fill="rgba(15,23,42,.90)">${tx(monthName)}</text>`);
        }else{
          parts.push(`<line x1="${cx}" y1="${label1Y-10}" x2="${cx}" y2="${label1Y-4}" stroke="rgba(15,23,42,.40)" stroke-width="1.2" stroke-linecap="round"/>`);
        }
        parts.push(`<text x="${cx}" y="${label2Y-5}" text-anchor="middle" font-size="9" font-weight="850" fill="rgba(15,23,42,.78)">${tx(lab(day.date))}</text>`);
      }
    }else if(historyRange===14 || historyRange===30){
      parts.push(`<circle cx="${cx}" cy="${label1Y-3}" r="1.35" fill="rgba(15,23,42,.34)"/>`);
    }
  });
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=parts.join('');
}document.onclick=()=>{if(openColor){openColor=null;render()}};document.getElementById('add').onclick=e=>{e.stopPropagation();let i=state.buckets.length;state.buckets.push({id:uid(),name:'Project '+(i+1),elapsed:0,target:60,color:colors[i%colors.length],notified:false});save();render()};document.getElementById('history').onclick=e=>{e.stopPropagation();historyOpen=!historyOpen;document.getElementById('panel').className='panel'+(historyOpen?' open':'');saveDay(state);save();if(historyOpen)drawChart()};document.querySelectorAll('.rangeTabs button').forEach(btn=>btn.onclick=e=>{
  e.stopPropagation();
  historyRange=parseInt(btn.dataset.range,10)||7;
  document.querySelectorAll('.rangeTabs button').forEach(b=>b.classList.toggle('active',b===btn));
  if(historyOpen)drawChart();
});
render();setInterval(tick,1000);
})();</script></body></html>
