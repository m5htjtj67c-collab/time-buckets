function render(){if(typing)return;document.querySelectorAll('.dropIndicator').forEach(e=>e.remove());let list=document.getElementById('list');list.innerHTML='';state.buckets.forEach(b=>{let pct=Math.min(b.elapsed/(b.target*60),1)*100,run=active===b.id,full=b.elapsed>=b.target*60,sw=colors.map(c=>`<span class="swatch" data-c="${c}" style="background:${c}"></span>`).join(''),row=document.createElement('section');row.className='row'+(run?' running':'')+(full?' full':'');row.draggable=true;row.dataset.id=b.id;row.style.setProperty('--bar-color',b.color);row.style.setProperty('--bar-bg',rgb(b.color,.24));row.innerHTML=`<div class="handle">⋮</div><div class="colorWrap"><div class="colorDot" style="background:${b.color}"></div><div class="popup ${openColor===b.id?'open':''}"><div class="popTop"><span>Color</span><span class="close">×</span></div><div class="swatches">${sw}</div></div></div><input class="name" value="${esc(b.name)}"><div class="bar"><div class="fill" style="width:${pct}%"></div><div class="text">${full?extra(b):(run?fmt(b.elapsed):'')}</div></div><input class="target" value="${b.target}m" inputmode="numeric"><button class="btn reset">↺</button><button class="btn plus">+5</button>`;list.appendChild(row);row.ondragstart=e=>{dragId=b.id;e.dataTransfer.setData('text/plain',b.id);row.classList.add('dragging')};row.ondragend=()=>{dragId=null;row.classList.remove('dragging');document.querySelectorAll('.dropIndicator').forEach(e=>e.remove());trash.classList.remove('over')};});wire();if(historyOpen)drawChart()}

function indexFromY(y){let rows=[...document.querySelectorAll('.row')];for(let i=0;i<rows.length;i++){let r=rows[i].getBoundingClientRect();if(y<r.top+r.height/2)return i}return rows.length}function showDrop(i){document.querySelectorAll('.dropIndicator').forEach(e=>e.remove());let ind=document.createElement('div');ind.className='dropIndicator';let rows=[...document.querySelectorAll('.row')],list=document.getElementById('list');if(i>=rows.length)list.appendChild(ind);else list.insertBefore(ind,rows[i])}let list=document.getElementById('list'),trash=document.getElementById('trash');list.ondragover=e=>{if(!dragId)return;e.preventDefault();dropIndex=indexFromY(e.clientY);showDrop(dropIndex)};list.ondrop=e=>{e.preventDefault();let from=state.buckets.findIndex(x=>x.id===dragId),m=state.buckets.splice(from,1)[0];if(dropIndex>from)dropIndex--;state.buckets.splice(Math.max(0,dropIndex),0,m);save();render()};trash.ondragover=e=>{e.preventDefault();trash.classList.add('over')};trash.ondragleave=()=>trash.classList.remove('over');trash.ondrop=e=>{e.preventDefault();state.buckets=state.buckets.filter(x=>x.id!==dragId);dragId=null;save();render()};
function applyElastic(){let total=state.totalTarget||240,spent=0,flex=[];state.buckets.forEach((b,i)=>{if(b.elapsed>b.target*60)spent+=b.elapsed/60;else flex.push(i)});let rem=Math.max(flex.length,total-spent),each=rem/Math.max(1,flex.length);flex.forEach(i=>state.buckets[i].target=Math.max(1,Math.round(each)))}function renderElastic(){let p=document.getElementById('elastic');p.className='elastic'+(elasticOpen?' open':'');if(!elasticOpen)return;let total=document.getElementById('total');if(document.activeElement!==total)total.value=(state.totalTarget||240)+'m';let bar=document.getElementById('elasticBar');bar.innerHTML='';let sum=state.buckets.reduce((a,b)=>a+b.target,0)||1;state.buckets.forEach((b,i)=>{let seg=document.createElement('div');seg.className='seg';seg.style.background=b.color;seg.style.width=(100*b.target/sum)+'%';seg.textContent=b.name.slice(0,9);if(i<state.buckets.length-1){let h=document.createElement('span');h.className='segHandle';let sx=0,l=0,r=0;h.onpointerdown=e=>{sx=e.clientX;l=b.target;r=state.buckets[i+1].target;h.setPointerCapture(e.pointerId)};h.onpointermove=e=>{if(!sx)return;let d=Math.round((e.clientX-sx)/3),nl=Math.max(5,l+d),nr=Math.max(5,r-d),orig=l+r;if(nl+nr!==orig){if(nl>nr)nl=orig-nr;else nr=orig-nl}b.target=nl;state.buckets[i+1].target=nr;save();render()};h.onpointerup=()=>{sx=0;save();render()};seg.appendChild(h)}bar.appendChild(seg)})}
function tick(){let now=Date.now(),d=(now-last)/1000;last=now;if(today()!==state.date){saveDay(state);state.date=today();state.buckets.forEach(b=>{b.elapsed=0;b.notified=false});active=null;save();render();return}if(!active)return;let b=state.buckets.find(x=>x.id===active);if(!b)return;b.elapsed+=d;if(b.elapsed>=b.target*60&&!b.notified){b.notified=true;active=null;chime()}if(elasticOpen)applyElastic();save();render()}
function addDays(ds,n){let d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}function days(){let arr=(state.history||[]).concat([{date:state.date,buckets:state.buckets}]),map={};arr.forEach(d=>map[d.date]=d);let keys=Object.keys(map).sort();if(!keys.length)return[];let out=[],cur=keys[0],guard=0;while(cur<=state.date&&guard++<31){out.push(map[cur]||{date:cur,buckets:[]});cur=addDays(cur,1)}return out.slice(-14)}function lab(d){let p=d.split('-');return p.length===3?p[1]+'/'+p[2]:d}function drawChart(){let c=document.getElementById('chart'),ctx=c.getContext('2d'),ds=days(),slots=Math.max(7,ds.length+3),barW=24,gap=10,padL=34,padR=10,padT=24,padB=24;c.width=padL+padR+slots*barW+(slots-1)*gap;c.height=220;let w=c.width,h=c.height,ch=h-padT-padB,target=Math.max(30,state.buckets.reduce((a,b)=>a+b.target,0)),actual=Math.max(0,...ds.map(d=>(d.buckets||[]).reduce((a,b)=>a+b.elapsed/60,0))),yMax=Math.max(target,actual),half=yMax/2;ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(17,24,39,.2)';ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+ch);ctx.lineTo(w-padR,padT+ch);ctx.stroke();ctx.strokeStyle='rgba(17,24,39,.08)';ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(w-padR,padT);ctx.moveTo(padL,padT+ch/2);ctx.lineTo(w-padR,padT+ch/2);ctx.stroke();ctx.fillStyle='rgba(17,24,39,.5)';ctx.font='13px -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(yMax),padL-5,padT+4);ctx.fillText(Math.round(half),padL-5,padT+ch/2+4);ctx.textAlign='start';ds.forEach((day,i)=>{let x=padL+i*(barW+gap),y=padT+ch;(day.buckets||[]).forEach(b=>{let bh=Math.min((b.elapsed/60)/yMax*ch,ch);y-=bh;ctx.fillStyle=b.color;ctx.fillRect(x,y,barW,bh)});let full=(day.buckets||[]).length&&(day.buckets||[]).every(b=>b.elapsed>=b.target*60);if(full){ctx.save();ctx.font='17px -apple-system';ctx.textAlign='center';ctx.fillStyle='#fbbf24';ctx.shadowColor='rgba(251,191,36,.55)';ctx.shadowBlur=8;ctx.fillText('👑',x+barW/2,padT-6);ctx.restore()}ctx.fillStyle='rgba(17,24,39,.5)';ctx.font='12px -apple-system';ctx.fillText(lab(day.date),x-2,h-8)});let legend=document.getElementById('legend');legend.innerHTML='';state.buckets.forEach(b=>{let el=document.createElement('div');el.className='legendItem';el.innerHTML=`<span class="legendDot" style="background:${b.color}"></span>${esc(b.name)}`;legend.appendChild(el)})}
document.onclick=()=>{if(openColor){openColor=null;render()}};document.getElementById('add').onclick=e=>{e.stopPropagation();let i=state.buckets.length;state.buckets.push({id:uid(),name:'Project '+(i+1),elapsed:0,target:60,color:colors[i%colors.length],notified:false});save();render()};document.getElementById('history').onclick=e=>{e.stopPropagation();historyOpen=!historyOpen;document.getElementById('panel').className='panel'+(historyOpen?' open':'');saveDay(state);save();if(historyOpen)drawChart()};document.getElementById('elasticBtn').onclick=e=>{e.stopPropagation();elasticOpen=!elasticOpen;save();render()};document.getElementById('total').onfocus=function(){typing=true;this.value=String(state.totalTarget||240);this.select()};document.getElementById('total').onblur=function(){state.totalTarget=parseN(this.value,state.totalTarget||240);typing=false;save();render()};document.getElementById('total').onkeydown=function(e){if(e.key==='Enter')this.blur()};initSync();render();setInterval(tick,1000);
})();</script></body></html>
