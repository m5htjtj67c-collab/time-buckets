<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reset Time Buckets</title></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#f6f2ea;padding:24px">
<main style="max-width:420px;margin:auto;background:white;border:1px solid #e5e7eb;border-radius:20px;padding:22px">
<h1>Reset Time Buckets</h1>
<p>This clears saved local Time Buckets data and restores fresh defaults.</p>
<button id="reset" style="padding:12px;border:0;border-radius:12px;background:#fee2e2;color:#b91c1c;font-weight:800">Clear saved data</button>
<a href="./index.html" style="display:inline-block;margin-left:8px;padding:12px;border-radius:12px;background:#e0ecff;color:#2563eb;text-decoration:none;font-weight:800">Open app</a>
<p id="status"></p>
</main>
<script>
document.getElementById("reset").onclick=function(){
  Object.keys(localStorage).forEach(function(k){
    if(k.indexOf("timeBuckets")===0 || k.indexOf("projectBuckets")===0) localStorage.removeItem(k);
  });
  document.getElementById("status").textContent="Cleared.";
};
</script>
</body></html>
